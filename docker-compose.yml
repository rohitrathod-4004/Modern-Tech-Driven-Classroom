version: "3.8"

services:
  mongodb:
    image: mongo:latest
    container_name: classroom-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: classroom-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  whisper:
    build:
      context: ./python-services/whisper-service
      dockerfile: Dockerfile
    container_name: classroom-whisper
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - WHISPER_MODEL=base
    restart: unless-stopped

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: classroom-backend
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGO_URI=mongodb://mongodb:27017/lecture-transcription
      - QDRANT_URL=http://qdrant:6333
      - WHISPER_SERVICE_URL=http://whisper:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      - mongodb
      - qdrant
      - whisper
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: classroom-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
  qdrant_data:
  backend_uploads:
